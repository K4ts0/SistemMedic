<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Cadastro — Way For System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card card-elevated">
      <div class="auth-header">
        <div class="logo">📝</div>
        <h1>Way For System</h1>
        <p>Crie sua conta para começar</p>
      </div>

      <div id="mensagem" class="mensagem"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Nome completo</label>
          <input type="text" id="name" placeholder="Dr. João Silva" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
          <small style="color:var(--gray-400); font-size:0.8rem; margin-top:4px; display:block;">Mínimo 6 caracteres</small>
        </div>
        <div class="form-group">
          <label class="form-label" for="specialty">Especialidade</label>
          <select id="specialty" required>
            <option value="">Selecione sua especialidade...</option>
            <option value="Cardiologia">❤️ Cardiologia</option>
            <option value="Dermatologia">🔬 Dermatologia</option>
            <option value="Endocrinologia">🩸 Endocrinologia</option>
            <option value="Gastroenterologia">🫁 Gastroenterologia</option>
            <option value="Ginecologia">👩 Ginecologia</option>
            <option value="Neurologia">🧠 Neurologia</option>
            <option value="Oftalmologia">👁️ Oftalmologia</option>
            <option value="Ortopedia">🦴 Ortopedia</option>
            <option value="Pediatria">👶 Pediatria</option>
            <option value="Psiquiatria">💭 Psiquiatria</option>
            <option value="Urologia">🚹 Urologia</option>
            <option value="Clínica Geral">🩺 Clínica Geral</option>
            <option value="Outra">📋 Outra</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="crm">CRM / Registro Profissional</label>
          <input type="text" id="crm" placeholder="CRM-SP 123456" required />
          <small style="color:var(--gray-400); font-size:0.8rem; margin-top:4px; display:block;">Ex: CRM-SP 123456, CRM-RJ 654321</small>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="margin-top:8px;" id="submitBtn">
          <span>✨</span> Cadastrar
        </button>
      </form>

      <div class="auth-footer">
        Já tem conta? <a href="index.html">Faça login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp, getCurrentUser, checkEmailExists, checkCRMExists, checkEmailDuplicate } from './supabase-config.js';

    (async function init() {
      // Verifica se já está logado
      try {
        const user = await getCurrentUser();
        if (user) window.location.href = 'dashboard.html';
      } catch {}

      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const specialty = document.getElementById('specialty').value;
        const crm = document.getElementById('crm').value.trim();

        // Validações básicas
        if (!name || !email || !password || !specialty || !crm) {
          showMessage('Preencha todos os campos obrigatórios.', 'erro');
          return;
        }
        if (password.length < 6) {
          showMessage('A senha deve ter pelo menos 6 caracteres.', 'erro');
          return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span> Verificando...';

        // Verifica CRM duplicado
        try {
          const crmExists = await checkCRMExists(crm);
          if (crmExists) {
            showMessage('CRM já cadastrado no sistema. Use outro número ou faça login.', 'erro');
            btn.disabled = false;
            btn.innerHTML = '<span>✨</span> Cadastrar';
            return;
          }
        } catch (e) {
          console.error('Erro ao verificar CRM:', e);
        }

        // Verifica email duplicado (profiles + auth)
        try {
          const emailExists = await checkEmailDuplicate(email);
          if (emailExists) {
            showMessage('Email já cadastrado. Faça login ou use outro email.', 'erro');
            btn.disabled = false;
            btn.innerHTML = '<span>✨</span> Cadastrar';
            return;
          }
        } catch (e) {
          console.error('Erro ao verificar email:', e);
        }

        btn.innerHTML = '<span>⏳</span> Cadastrando...';

        try {
          const { user, session } = await signUp(email, password, name, specialty, crm);

          // Se o cadastro retornou sessão (confirmação de email desativada), loga direto
          if (session) {
            showMessage('Cadastro realizado com sucesso! Redirecionando...', 'sucesso');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
          } else {
            // Confirmação de email ativada - mostra mensagem amigável
            showMessage(
              'Cadastro realizado! Verifique seu email e clique no link de confirmação. ' +
              'Se não receber, verifique a pasta de spam.', 
              'sucesso'
            );
            // Mostra botão para reenviar confirmação
            btn.disabled = false;
            btn.innerHTML = '<span>📧</span> Reenviar Email de Confirmação';
            btn.onclick = async () => {
              btn.disabled = true;
              btn.innerHTML = '<span>⏳</span> Reenviando...';
              try {
                const { supabase } = await import('./supabase-config.js');
                // CORRIGIDO: emailRedirectTo agora aponta para auth-confirm.html
                const { error } = await supabase.auth.resend({
                  type: 'signup',
                  email: email,
                  options: { emailRedirectTo: window.location.origin + '/auth-confirm.html' }
                });
                if (error) throw error;
                showMessage('Email de confirmação reenviado! Verifique sua caixa de entrada.', 'sucesso');
              } catch (err) {
                showMessage(err.message || 'Erro ao reenviar email.', 'erro');
              } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>📧</span> Reenviar Email de Confirmação';
              }
            };
          }
        } catch (error) {
          let msg = error.message || 'Erro no cadastro. Tente novamente.';
          // Traduz erros comuns do Supabase
          if (msg.includes('User already registered') || msg.includes('already registered')) {
            msg = 'Email já cadastrado. Faça login ou use outro email.';
          } else if (msg.includes('duplicate')) {
            msg = 'Dados já cadastrados (email ou CRM). Verifique e tente novamente.';
          }
          showMessage(msg, 'erro');
          btn.disabled = false;
          btn.innerHTML = '<span>✨</span> Cadastrar';
        }
      });

      function showMessage(msg, type = 'erro') {
        const el = document.getElementById('mensagem');
        el.textContent = msg;
        el.className = `mensagem ${type}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 8000);
      }
    })();
  </script>
</body>
</html>
