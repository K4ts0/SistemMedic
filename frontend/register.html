<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Cadastro — NoteMed for Unisystem</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card card-elevated">
      <div class="auth-header">
        <div class="logo">📝</div>
        <h1>NoteMed for Unisystem</h1>
        <p>Crie sua conta para começar</p>
      </div>

      <div id="mensagem" class="mensagem"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Nome completo</label>
          <input type="text" id="name" placeholder="Dr. João Silva" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="margin-top:8px;">
          <span>✨</span> Cadastrar
        </button>
      </form>

      <div class="auth-footer">
        Já tem conta? <a href="index.html">Faça login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp } from './supabase-config.js';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signUp(email, password, name);
        alert('Cadastro realizado com sucesso! Faça login.');
        window.location.href = 'index.html';
      } catch (error) {
        const msg = document.getElementById('mensagem');
        msg.textContent = error.message || 'Erro no cadastro';
        msg.className = 'mensagem erro';
      }
    });
  </script>
</body>
</html>
