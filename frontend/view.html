<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteMed - Visualizar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="voltar">← Voltar</a>
    <h1 id="noteTitle"></h1>
    <div id="noteContent" style="background: #f9fafb; padding: 20px; border-radius: 12px; white-space: pre-wrap; min-height: 120px;"></div>
    <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
      <button onclick="editar()">Editar</button>
      <button onclick="window.location.href='dashboard.html'" class="btn-secondary">Voltar</button>
    </div>
  </div>

  <script type="module">
    import { 
      getNote, 
      getCurrentUser, 
      ensureValidSession, 
      checkSingleSession
    } from './supabase-config.js';

    if (!await ensureValidSession()) {
      // já redirecionado
    }

    const user = await getCurrentUser();
    if (!user) window.location.href = 'index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const noteId = urlParams.get('id');

    if (!noteId) {
      window.location.href = 'dashboard.html';
    }

    try {
      const note = await getNote(noteId);
      document.getElementById('noteTitle').textContent = note.title;
      document.getElementById('noteContent').textContent = note.content;
      window.editar = () => {
        window.location.href = `note.html?id=${noteId}`;
      };
    } catch (error) {
      alert('Erro ao carregar nota.');
      window.location.href = 'dashboard.html';
    }

    setInterval(async () => {
      await checkSingleSession();
    }, 10000);
  </script>
</body>
</html>
