<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteMed - Minhas Anotações</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo-icon">📝</div>
        <div class="app-title">NoteMed <span>for Unisystem</span></div>
      </div>
      <div class="user-area">
        <span class="user-name" id="userName"></span>
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <button class="btn-new-note" id="novaNotaBtn">+ Nova Anotação</button>

    <div id="listaNotas" class="note-list">
      <p style="color: #8a9aa8; text-align: center; padding: 30px 0;">Carregando anotações...</p>
    </div>
  </div>

  <script type="module">
    import { 
      getCurrentUser, 
      signOut, 
      getNotes, 
      deleteNote,
      toggleFavorite,
      ensureValidSession,
      checkSingleSession
    } from './supabase-config.js';

    if (!await ensureValidSession()) {
      // já redirecionado
    }

    const user = await getCurrentUser();
    if (!user) window.location.href = 'index.html';
    document.getElementById('userName').textContent = user.user_metadata?.name || user.email;

    window.toggleFavorito = async (id, currentState) => {
      try {
        await toggleFavorite(id, currentState);
        showMessage('Favorito atualizado!', 'sucesso');
        await carregarNotas();
      } catch (error) {
        showMessage('Erro ao alterar favorito.', 'erro');
      }
    };

    window.visualizarNota = (id) => {
      window.location.href = `view.html?id=${id}`;
    };

    window.editarNota = (id) => {
      window.location.href = `note.html?id=${id}`;
    };

    window.excluirNota = async (id) => {
      if (!confirm('Tem certeza que deseja excluir esta anotação?')) return;
      try {
        await deleteNote(id);
        showMessage('Nota excluída com sucesso!', 'sucesso');
        await carregarNotas();
      } catch (error) {
        showMessage('Erro ao excluir nota.', 'erro');
      }
    };

    async function carregarNotas() {
      try {
        const notas = await getNotes();
        const container = document.getElementById('listaNotas');
        if (notas.length === 0) {
          container.innerHTML = '<p style="color: #8a9aa8; text-align: center; padding: 30px 0;">Nenhuma anotação ainda. Crie sua primeira!</p>';
          return;
        }
        container.innerHTML = notas.map(note => `
          <div class="note-item" data-id="${note.id}">
            <div class="info">
              <h3>
                <a href="view.html?id=${note.id}">
                  ${note.title}
                </a>
              </h3>
              <p>${note.content ? note.content.substring(0, 100) : ''}${note.content && note.content.length > 100 ? '...' : ''}</p>
              <small>Atualizado em: ${new Date(note.updated_at).toLocaleString()}</small>
            </div>
            <div class="actions">
              <button class="btn-fav" onclick="toggleFavorito('${note.id}', ${note.is_favorite})" title="${note.is_favorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}">
                ${note.is_favorite ? '⭐' : '☆'}
              </button>
              <button onclick="visualizarNota('${note.id}')">Visualizar</button>
              <button onclick="editarNota('${note.id}')">Editar</button>
              <button class="btn-danger" onclick="excluirNota('${note.id}')">Excluir</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        showMessage('Erro ao carregar notas.', 'erro');
      }
    }

    document.getElementById('novaNotaBtn').addEventListener('click', () => {
      window.location.href = 'note.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut();
      localStorage.removeItem('session_id');
      window.location.href = 'index.html';
    });

    setInterval(async () => {
      await checkSingleSession();
    }, 10000);

    window.showMessage = (msg, type = 'erro') => {
      const el = document.getElementById('mensagem');
      el.textContent = msg;
      el.className = `mensagem ${type}`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    };

    carregarNotas();
  </script>
</body>
</html>
