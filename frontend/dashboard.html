<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Anotações</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Minhas Anotações</h1>
        <span class="user">👤 <span id="userName"></span></span>
      </div>
      <button class="logout" id="logoutBtn">Sair</button>
    </div>

    <div id="mensagem" class="mensagem"></div>
    <button id="novaNotaBtn" style="margin-bottom: 20px;">+ Nova Anotação</button>

    <div id="listaNotas" class="note-list">
      <p style="color: #888;">Carregando...</p>
    </div>
  </div>

  <script type="module">
    import { 
      getCurrentUser, 
      signOut, 
      getNotes, 
      deleteNote,
      toggleFavorite,
      ensureValidSession,
      validateSession,
      checkSingleSession  // ✅ NOVO: Importa a verificação de sessão única
    } from './supabase-config.js';

    // Verifica sessão única no carregamento
    if (!await ensureValidSession()) {
      // já redirecionado
    }

    const user = await getCurrentUser();
    if (!user) window.location.href = 'index.html';
    document.getElementById('userName').textContent = user.user_metadata?.name || user.email;

    window.toggleFavorito = async (id, currentState) => {
      try {
        await toggleFavorite(id, currentState);
        showMessage('Favorito atualizado!', 'sucesso');
        await carregarNotas();
      } catch (error) {
        showMessage('Erro ao alterar favorito.', 'erro');
      }
    };

    window.visualizarNota = (id) => {
      window.location.href = `view.html?id=${id}`;
    };

    window.editarNota = (id) => {
      window.location.href = `note.html?id=${id}`;
    };

    window.excluirNota = async (id) => {
      if (!confirm('Tem certeza que deseja excluir esta anotação?')) return;
      try {
        await deleteNote(id);
        showMessage('Nota excluída com sucesso!', 'sucesso');
        await carregarNotas();
      } catch (error) {
        showMessage('Erro ao excluir nota.', 'erro');
      }
    };

    async function carregarNotas() {
      try {
        const notas = await getNotes();
        const container = document.getElementById('listaNotas');
        if (notas.length === 0) {
          container.innerHTML = '<p style="color: #888;">Nenhuma anotação ainda. Clique em "Nova Anotação" para começar.</p>';
          return;
        }
        container.innerHTML = notas.map(note => `
          <div class="note-item" data-id="${note.id}">
            <div class="info">
              <h3>
                <a href="view.html?id=${note.id}" style="color: #1a3b5d; text-decoration: none;">
                  ${note.title}
                </a>
              </h3>
              <p>${note.content ? note.content.substring(0, 100) : ''}${note.content && note.content.length > 100 ? '...' : ''}</p>
              <small style="color: #999;">Atualizado em: ${new Date(note.updated_at).toLocaleString()}</small>
            </div>
            <div class="actions">
              <button onclick="toggleFavorito('${note.id}', ${note.is_favorite})" 
                      style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"
                      title="${note.is_favorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}">
                ${note.is_favorite ? '⭐' : '☆'}
              </button>
              <button onclick="visualizarNota('${note.id}')">Visualizar</button>
              <button onclick="editarNota('${note.id}')">Editar</button>
              <button class="danger" onclick="excluirNota('${note.id}')">Excluir</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        showMessage('Erro ao carregar notas.', 'erro');
      }
    }

    document.getElementById('novaNotaBtn').addEventListener('click', () => {
      window.location.href = 'note.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut();
      localStorage.removeItem('session_id');
      window.location.href = 'index.html';
    });

    // ✅ CORREÇÃO: Verificação periódica usando checkSingleSession
    // Isso detecta se outro dispositivo fez login e força logout
    setInterval(async () => {
      await checkSingleSession();
    }, 10000); // Verifica a cada 10 segundos (mais rápido para detectar login em outro dispositivo)

    window.showMessage = (msg, type = 'erro') => {
      const el = document.getElementById('mensagem');
      el.textContent = msg;
      el.className = `mensagem ${type}`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    };

    carregarNotas();
  </script>
</body>
</html>
