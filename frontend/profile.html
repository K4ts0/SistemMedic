<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Meu Perfil — NoteMed for Unisystem</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<base target="_blank">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <div class="logo-icon">📝</div>
        <div>
          <h1>NoteMed for Unisystem</h1>
          <div class="subtitle">Meu Perfil</div>
        </div>
      </div>
      <div class="user-info" id="userInfo">
        <div class="avatar" id="headerAvatar">👤</div>
        <span class="user-name" id="headerName">...</span>
        <button class="btn btn-ghost btn-icon" id="logoutBtn" title="Sair">🚪</button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-menu">
      <button class="nav-item" data-page="dashboard"><span>📋</span> Anotações</button>
      <button class="nav-item active" data-page="profile"><span>👤</span> Perfil</button>
      <button class="nav-item" data-page="chat"><span>💬</span> Chat</button>
      <button class="nav-item" data-page="cid"><span>🔍</span> CID</button>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <div class="card">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">
          👤
          <div class="avatar-upload" id="avatarUpload">📷 Alterar</div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <div class="profile-info">
          <h2 id="profileName">Carregando...</h2>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-specialty" id="profileSpecialty" style="display:none;">
            <span>🩺</span> <span id="specialtyText"></span>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="profile-stats" id="profileStats">
        <div class="stat-card">
          <div class="stat-value" id="statNotes">0</div>
          <div class="stat-label">Anotações</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statFavorites">0</div>
          <div class="stat-label">Favoritas</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statUserId">—</div>
          <div class="stat-label">ID do Usuário</div>
        </div>
      </div>

      <div class="divider">Editar Informações</div>

      <!-- Edit Form -->
      <form id="profileForm">
        <div class="form-group">
          <label class="form-label" for="editName">Nome completo</label>
          <input type="text" id="editName" placeholder="Dr. João Silva" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editSpecialty">Especialidade</label>
          <select id="editSpecialty">
            <option value="">Selecione...</option>
            <option value="Cardiologia">❤️ Cardiologia</option>
            <option value="Dermatologia">🔬 Dermatologia</option>
            <option value="Endocrinologia">🩸 Endocrinologia</option>
            <option value="Gastroenterologia">🫁 Gastroenterologia</option>
            <option value="Ginecologia">👩 Ginecologia</option>
            <option value="Neurologia">🧠 Neurologia</option>
            <option value="Oftalmologia">👁️ Oftalmologia</option>
            <option value="Ortopedia">🦴 Ortopedia</option>
            <option value="Pediatria">👶 Pediatria</option>
            <option value="Psiquiatria">💭 Psiquiatria</option>
            <option value="Urologia">🚹 Urologia</option>
            <option value="Clínica Geral">🩺 Clínica Geral</option>
            <option value="Outra">📋 Outra</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="editCrm">CRM / Registro Profissional</label>
          <input type="text" id="editCrm" placeholder="CRM-SP 123456" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editPhone">Telefone</label>
          <input type="tel" id="editPhone" placeholder="(11) 99999-9999" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editBio">Biografia / Observações</label>
          <textarea id="editBio" placeholder="Breve descrição sobre você..." style="min-height:100px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="saveProfileBtn">
          <span>💾</span> Salvar Alterações
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { 
      getCurrentUser, signOut, ensureValidSession, checkSingleSession,
      getUserProfile, updateUserProfile, getNotes
    } from './supabase-config.js';

    (async function init() {
      const isValid = await ensureValidSession();
      if (!isValid) return;

      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }

      let currentProfile = null;

      // ✅ CORREÇÃO: Navegação por botões
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.dataset.page;
          if (page) window.location.href = page + '.html';
        });
      });

      async function loadProfile() {
        try {
          currentProfile = await getUserProfile();
          const notes = await getNotes();
          const favorites = notes.filter(n => n.is_favorite);

          // Header
          document.getElementById('headerName').textContent = currentProfile.name || currentProfile.email;
          const headerAvatar = document.getElementById('headerAvatar');
          if (currentProfile.avatar_url) {
            headerAvatar.innerHTML = `<img src="${currentProfile.avatar_url}" alt="Avatar">`;
          } else {
            headerAvatar.textContent = (currentProfile.name || currentProfile.email || 'U').charAt(0).toUpperCase();
          }

          // Profile header
          document.getElementById('profileName').textContent = currentProfile.name || 'Sem nome';
          document.getElementById('profileEmail').textContent = currentProfile.email;

          const profileAvatar = document.getElementById('profileAvatar');
          if (currentProfile.avatar_url) {
            profileAvatar.innerHTML = `<img src="${currentProfile.avatar_url}" alt="Avatar"><div class="avatar-upload" id="avatarUpload">📷 Alterar</div>`;
          } else {
            profileAvatar.innerHTML = `${(currentProfile.name || 'U').charAt(0).toUpperCase()}<div class="avatar-upload" id="avatarUpload">📷 Alterar</div>`;
          }
          document.getElementById('avatarUpload').addEventListener('click', () => {
            document.getElementById('avatarInput').click();
          });

          // Specialty
          if (currentProfile.specialty) {
            document.getElementById('profileSpecialty').style.display = 'inline-flex';
            document.getElementById('specialtyText').textContent = currentProfile.specialty;
          }

          // Stats
          document.getElementById('statNotes').textContent = notes.length;
          document.getElementById('statFavorites').textContent = favorites.length;
          document.getElementById('statUserId').textContent = currentProfile.id.substring(0, 8);

          // Form fields
          document.getElementById('editName').value = currentProfile.name || '';
          document.getElementById('editSpecialty').value = currentProfile.specialty || '';
          document.getElementById('editCrm').value = currentProfile.crm || '';
          document.getElementById('editPhone').value = currentProfile.phone || '';
          document.getElementById('editBio').value = currentProfile.bio || '';

        } catch (error) {
          showMessage('Erro ao carregar perfil.', 'erro');
        }
      }

      // Avatar upload
      document.getElementById('avatarInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 2 * 1024 * 1024) {
          showMessage('Imagem muito grande. Máximo 2MB.', 'erro');
          return;
        }

        try {
          showMessage('Enviando foto...', 'info');
          const reader = new FileReader();
          reader.onload = async (event) => {
            const base64 = event.target.result;
            await updateUserProfile({ avatar_url: base64 });
            showMessage('Foto atualizada!', 'sucesso');
            await loadProfile();
          };
          reader.readAsDataURL(file);
        } catch (error) {
          showMessage('Erro ao enviar foto.', 'erro');
        }
      });

      // Save profile
      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveProfileBtn');
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span> Salvando...';

        try {
          await updateUserProfile({
            name: document.getElementById('editName').value,
            specialty: document.getElementById('editSpecialty').value,
            crm: document.getElementById('editCrm').value,
            phone: document.getElementById('editPhone').value,
            bio: document.getElementById('editBio').value
          });
          showMessage('Perfil atualizado com sucesso!', 'sucesso');
          await loadProfile();
        } catch (error) {
          showMessage('Erro ao salvar perfil.', 'erro');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<span>💾</span> Salvar Alterações';
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut();
        localStorage.removeItem('session_id');
        window.location.href = 'index.html';
      });

      setInterval(async () => { await checkSingleSession(); }, 10000);

      window.showMessage = (msg, type = 'erro') => {
        const el = document.getElementById('mensagem');
        el.textContent = msg;
        el.className = `mensagem ${type}`;
        setTimeout(() => el.style.display = 'none', 5000);
      };

      loadProfile();
    })();
  </script>
</body>
</html>
