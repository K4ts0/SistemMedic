<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotação</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="voltar">← Voltar</a>
    <h1 id="formTitle">Nova Anotação</h1>
    <div id="mensagem" class="mensagem"></div>
    <form id="noteForm">
      <input type="text" id="noteTitle" placeholder="Título" required />
      <textarea id="noteContent" placeholder="Digite sua anotação..." required></textarea>
      <div class="buttons-row">
        <button type="submit" id="saveBtn">Salvar</button>
        <button type="button" id="cancelBtn" class="danger" style="background: #ccc; color: #333;">Cancelar</button>
      </div>
    </form>
  </div>

  <script type="module">
    // IMPORTAÇÃO ÚNICA (sem duplicidade)
    import { 
      getCurrentUser, 
      getNote, 
      createNote, 
      updateNote,
      ensureValidSession,
      validateSession,
      signOut
    } from './supabase-config.js';

    // Verifica sessão única
    if (!await ensureValidSession()) {
      // já redirecionado
    }

    const user = await getCurrentUser();
    if (!user) window.location.href = 'index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const noteId = urlParams.get('id');
    const isEditing = !!noteId;

    if (isEditing) {
      document.getElementById('formTitle').textContent = 'Editar Anotação';
      try {
        const note = await getNote(noteId);
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content;
      } catch (error) {
        showMessage('Erro ao carregar nota.', 'erro');
      }
    }

    document.getElementById('noteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('noteTitle').value;
      const content = document.getElementById('noteContent').value;

      try {
        if (isEditing) {
          await updateNote(noteId, title, content);
        } else {
          await createNote(title, content);
        }
        showMessage(`Nota ${isEditing ? 'atualizada' : 'criada'} com sucesso!`, 'sucesso');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (error) {
        showMessage(error.message || 'Erro ao salvar.', 'erro');
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    function showMessage(msg, type) {
      const el = document.getElementById('mensagem');
      el.textContent = msg;
      el.className = `mensagem ${type}`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    // Verificação de sessão a cada 3 segundos (mais rápido)
    setInterval(async () => {
      if (!await validateSession()) {
        await signOut();
        localStorage.removeItem('session_id');
        window.location.href = 'index.html';
      }
    }, 3000);

    // Verifica ao focar a página
    document.addEventListener('visibilitychange', async () => {
      if (!document.hidden) {
        if (!await validateSession()) {
          await signOut();
          localStorage.removeItem('session_id');
          window.location.href = 'index.html';
        }
      }
    });
  </script>
</body>
</html>
