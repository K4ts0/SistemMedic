<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title id="pageTitle">Nova Anotação — NoteMed for Unisystem</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<base target="_blank">
</head>
<body>
  <div class="container">
    <a href="#" class="back-link" id="backLink">
      <span>←</span> Voltar
    </a>

    <div class="card">
      <h1 id="formTitle" style="margin-bottom:8px;">📝 Nova Anotação</h1>
      <p id="formDesc" style="color:var(--gray-400); margin-bottom:24px; font-size:0.95rem;">
        Preencha os campos abaixo para criar sua anotação médica.
      </p>

      <div id="mensagem" class="mensagem"></div>

      <form id="noteForm">
        <div class="form-group">
          <label class="form-label" for="noteTitle">Título da anotação</label>
          <input type="text" id="noteTitle" placeholder="Ex: Consulta Cardiologia - Paciente João" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="noteContent">Conteúdo</label>
          <textarea id="noteContent" placeholder="Descreva os detalhes da anotação..." required></textarea>
        </div>
        <div class="buttons-row" style="margin-top:8px;">
          <button type="submit" class="btn btn-primary btn-lg" id="saveBtn">
            <span>💾</span> Salvar
          </button>
          <button type="button" class="btn btn-secondary" id="cancelBtn">
            <span>❌</span> Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { 
      getCurrentUser, 
      getNote, 
      createNote, 
      updateNote,
      ensureValidSession,
      checkSingleSession
    } from './supabase-config.js';

    // ✅ CORREÇÃO: Botão Voltar usa history.back() ao invés de href
    document.getElementById('backLink').addEventListener('click', (e) => {
      e.preventDefault();
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    if (!await ensureValidSession()) {
      // já redirecionado
    }

    const user = await getCurrentUser();
    if (!user) window.location.href = 'index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const noteId = urlParams.get('id');
    const isEditing = !!noteId;

    if (isEditing) {
      document.getElementById('formTitle').textContent = '✏️ Editar Anotação';
      document.getElementById('pageTitle').textContent = 'Editar Anotação — NoteMed for Unisystem';
      document.getElementById('formDesc').textContent = 'Atualize os campos abaixo para editar sua anotação médica.';

      try {
        const note = await getNote(noteId);
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content;
      } catch (error) {
        showMessage('Erro ao carregar nota para edição.', 'erro');
      }
    }

    document.getElementById('noteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title || !content) {
        showMessage('Preencha todos os campos.', 'erro');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span>⏳</span> Salvando...';

      try {
        if (isEditing) {
          await updateNote(noteId, title, content);
        } else {
          await createNote(title, content);
        }
        showMessage(`Nota ${isEditing ? 'atualizada' : 'criada'} com sucesso!`, 'sucesso');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (error) {
        showMessage(error.message || 'Erro ao salvar.', 'erro');
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<span>💾</span> Salvar';
      }
    });

    // ✅ CORREÇÃO: Botão Cancelar usa history.back() ao invés de href
    document.getElementById('cancelBtn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    function showMessage(msg, type) {
      const el = document.getElementById('mensagem');
      el.textContent = msg;
      el.className = `mensagem ${type}`;
      setTimeout(() => el.style.display = 'none', 5000);
    }

    // Verificação periódica de sessão única
    setInterval(async () => {
      await checkSingleSession();
    }, 10000);
  </script>
</body>
</html>
