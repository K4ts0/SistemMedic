<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteMed - Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 48px; margin-bottom: 4px;">📝</div>
      <h1 style="font-size: 28px; margin: 0;">NoteMed</h1>
      <p style="color: #5e6f8d; margin: 0;">for Unisystem</p>
    </div>
    <div id="mensagem" class="mensagem"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>
    <p style="margin-top: 20px; text-align: center; color: #5e6f8d;">
      Não tem conta? <a href="register.html" style="color: #1a5f9e; font-weight: 500;">Cadastre-se</a>
    </p>
  </div>

  <script type="module">
    import { signIn, getCurrentUser, registerSession } from './supabase-config.js';

    try {
      const user = await getCurrentUser();
      if (user) window.location.href = 'dashboard.html';
    } catch {}

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signIn(email, password);
        await registerSession();
        window.location.href = 'dashboard.html';
      } catch (error) {
        const msg = document.getElementById('mensagem');
        msg.textContent = error.message || 'Erro no login';
        msg.className = 'mensagem erro';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
