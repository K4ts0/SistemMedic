<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Anotações Médicas</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <div id="mensagem" class="mensagem"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>
    <p style="margin-top: 15px; text-align: center;">
      Não tem conta? <a href="register.html">Cadastre-se</a>
    </p>
  </div>

  <script type="module">
    // 👇 IMPORTE registerSession
    import { signIn, getCurrentUser, registerSession } from './supabase-config.js';

    try {
      const user = await getCurrentUser();
      if (user) window.location.href = 'dashboard.html';
    } catch {}

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signIn(email, password);
        // 👇 REGISTRA A SESSÃO ÚNICA
        await registerSession();
        window.location.href = 'dashboard.html';
      } catch (error) {
        const msg = document.getElementById('mensagem');
        msg.textContent = error.message || 'Erro no login';
        msg.className = 'mensagem erro';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
