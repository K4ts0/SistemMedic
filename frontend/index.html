<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Login — Way For System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<base target="_blank">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card card-elevated">
      <div class="auth-header">
        <div class="logo">📝</div>
        <h1>Way For System</h1>
        <p>Gerencie suas anotações médicas com segurança</p>
      </div>

      <div id="mensagem" class="mensagem"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="margin-top:8px;">
          <span>🔐</span> Entrar
        </button>
      </form>

      <div class="auth-footer">
        Não tem conta? <a href="register.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { signIn, getCurrentUser, registerSession, supabase } from './supabase-config.js';

    (async function init() {
      // Verifica hash de erro na URL (ex: confirmação de email expirada)
      checkUrlErrors();

      // Verifica se já está logado
      try {
        const user = await getCurrentUser();
        if (user) {
          // Admin vai direto para o painel administrativo
          if (user.email === 'admin@wayforsystem.med') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }
      } catch {}

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          await signIn(email, password);
          await registerSession();
          // Verifica se é admin para redirecionar ao painel correto
          const { data: { user } } = await supabase.auth.getUser();
          if (user && user.email === 'admin@wayforsystem.med') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } catch (error) {
          const msg = document.getElementById('mensagem');
          msg.textContent = error.message || 'Erro no login';
          msg.className = 'mensagem erro';
        }
      });

      function checkUrlErrors() {
        // Verifica hash de erro (ex: #error=access_denied&error_code=otp_expired)
        const hash = window.location.hash;
        if (hash && hash.includes('error=')) {
          const params = new URLSearchParams(hash.slice(1));
          const errorCode = params.get('error_code');
          const errorDesc = params.get('error_description');

          if (errorCode === 'otp_expired' || errorDesc?.includes('expired')) {
            showMessage(
              'O link de confirmação expirou ou já foi usado. ' +
              'Tente fazer login diretamente ou cadastre-se novamente.', 
              'erro'
            );
          } else if (errorDesc) {
            showMessage(decodeURIComponent(errorDesc.replace(/\+/g, ' ')), 'erro');
          }
          // Limpa o hash da URL
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      }

      function showMessage(msg, type = 'erro') {
        const el = document.getElementById('mensagem');
        el.textContent = msg;
        el.className = `mensagem ${type}`;
      }
    })();
  </script>
</body>
</html>
