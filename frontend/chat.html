<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Chat — NoteMed for Unisystem</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<base target="_blank">
</head>
<body>
  <div class="container container-chat">
    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <div class="logo-icon">📝</div>
        <div>
          <h1>NoteMed for Unisystem</h1>
          <div class="subtitle">Chat Médico</div>
        </div>
      </div>
      <div class="user-info" id="userInfo">
        <div class="avatar" id="headerAvatar">👤</div>
        <span class="user-name" id="headerName">...</span>
        <button class="btn btn-ghost btn-icon" id="logoutBtn" title="Sair">🚪</button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-menu">
      <button class="nav-item" data-page="dashboard"><span>📋</span> Anotações</button>
      <button class="nav-item" data-page="profile"><span>👤</span> Perfil</button>
      <button class="nav-item active" data-page="chat"><span>💬</span> Chat</button>
      <button class="nav-item" data-page="cid"><span>🔍</span> CID</button>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <!-- User List -->
    <div class="toolbar" style="margin-bottom:12px;">
      <div class="toolbar-title">👥 Profissionais</div>
    </div>
    <div class="chat-user-list" id="userList">
      <div class="loading" style="padding:20px;">
        <div class="loading-spinner"></div>
        Carregando usuários...
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer" style="display:none;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--gray-100);">
        <div class="avatar" id="chatAvatar" style="width:40px;height:40px;font-size:1rem;">👤</div>
        <div>
          <div style="font-weight:600; color:var(--gray-800);" id="chatUserName">...</div>
          <div style="font-size:0.75rem; color:var(--gray-400); font-family:var(--font-mono);" id="chatUserId">...</div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" style="padding:30px 0;">
          <div class="empty-icon">💬</div>
          <p>Envie uma mensagem para iniciar a conversa</p>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem..." maxlength="500" />
        <button class="btn btn-primary" id="sendBtn" style="border-radius:50%; width:50px; height:50px; padding:0; font-size:1.3rem;">
          📤
        </button>
      </div>
    </div>

    <div class="empty-state" id="noChatSelected" style="padding:60px 0;">
      <div class="empty-icon">👥</div>
      <h3>Selecione um profissional</h3>
      <p>Clique em um usuário acima para iniciar uma conversa.</p>
    </div>
  </div>

  <script type="module">
    import { 
      getCurrentUser, signOut, ensureValidSession, checkSingleSession,
      getUserProfile, getChatUsers, sendMessage, getMessages
    } from './supabase-config.js';

    (async function init() {
      const isValid = await ensureValidSession();
      if (!isValid) return;

      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }

      let currentChatUser = null;
      let pollInterval = null;

      // ✅ CORREÇÃO: Navegação por botões
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.dataset.page;
          if (page) window.location.href = page + '.html';
        });
      });

      // Load header
      try {
        const profile = await getUserProfile();
        document.getElementById('headerName').textContent = profile.name || profile.email;
        const avatar = document.getElementById('headerAvatar');
        if (profile.avatar_url) {
          avatar.innerHTML = `<img src="${profile.avatar_url}" alt="Avatar">`;
        } else {
          avatar.textContent = (profile.name || profile.email || 'U').charAt(0).toUpperCase();
        }
      } catch (e) {}

      // Load users
      async function loadUsers() {
        try {
          const users = await getChatUsers();
          const container = document.getElementById('userList');

          if (users.length === 0) {
            container.innerHTML = '<p style="color:var(--gray-400); font-size:0.9rem; padding:10px;">Nenhum outro usuário encontrado.</p>';
            return;
          }

          container.innerHTML = users.map(u => `
            <div class="chat-user-item" data-id="${u.id}" data-name="${u.name || u.email}" data-avatar="${u.avatar_url || ''}" data-specialty="${u.specialty || ''}">
              <div class="user-avatar">
                ${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : (u.name || u.email || 'U').charAt(0).toUpperCase()}
              </div>
              <div>
                <div style="font-weight:600; font-size:0.9rem; color:var(--gray-700);">${u.name || u.email}</div>
                <div class="user-id">#${u.id.substring(0, 8)}</div>
                ${u.specialty ? `<div style="font-size:0.75rem; color:var(--gray-400);">🩺 ${u.specialty}</div>` : ''}
              </div>
            </div>
          `).join('');

          document.querySelectorAll('.chat-user-item').forEach(item => {
            item.addEventListener('click', () => openChat(item.dataset));
          });
        } catch (error) {
          document.getElementById('userList').innerHTML = '<p style="color:var(--gray-400);">Erro ao carregar usuários.</p>';
        }
      }

      async function openChat(userData) {
        currentChatUser = userData;

        document.querySelectorAll('.chat-user-item').forEach(i => i.classList.remove('active'));
        document.querySelector(`.chat-user-item[data-id="${userData.id}"]`).classList.add('active');

        document.getElementById('noChatSelected').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';

        document.getElementById('chatUserName').textContent = userData.name;
        document.getElementById('chatUserId').textContent = '#' + userData.id.substring(0, 8);

        const avatar = document.getElementById('chatAvatar');
        if (userData.avatar) {
          avatar.innerHTML = `<img src="${userData.avatar}" alt="">`;
        } else {
          avatar.textContent = (userData.name || 'U').charAt(0).toUpperCase();
        }

        await loadMessages();

        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
          if (currentChatUser && currentChatUser.id === userData.id) {
            loadMessages();
          }
        }, 3000);
      }

      async function loadMessages() {
        if (!currentChatUser) return;
        try {
          const messages = await getMessages(currentChatUser.id);
          renderMessages(messages);
        } catch (error) {
          console.error('Erro ao carregar mensagens:', error);
        }
      }

      function renderMessages(messages) {
        const container = document.getElementById('chatMessages');
        if (messages.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="padding:30px 0;">
              <div class="empty-icon">💬</div>
              <p>Envie uma mensagem para iniciar a conversa</p>
            </div>
          `;
          return;
        }

        container.innerHTML = messages.map(msg => {
          const isSent = msg.sender_id === user.id;
          const time = new Date(msg.created_at).toLocaleString('pt-BR', {
            hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short'
          });
          return `
            <div class="chat-message ${isSent ? 'sent' : 'received'}">
              ${!isSent ? `<div class="msg-sender">${currentChatUser.name}</div>` : ''}
              <div>${escapeHtml(msg.content)}</div>
              <div class="msg-time">${time}</div>
            </div>
          `;
        }).join('');

        container.scrollTop = container.scrollHeight;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const content = input.value.trim();
        if (!content || !currentChatUser) return;

        input.value = '';
        try {
          await sendMessage(currentChatUser.id, content);
          await loadMessages();
        } catch (error) {
          showMessage('Erro ao enviar mensagem.', 'erro');
        }
      }

      document.getElementById('sendBtn').addEventListener('click', sendChatMessage);
      document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut();
        localStorage.removeItem('session_id');
        window.location.href = 'index.html';
      });

      setInterval(async () => { await checkSingleSession(); }, 10000);

      window.showMessage = (msg, type = 'erro') => {
        const el = document.getElementById('mensagem');
        el.textContent = msg;
        el.className = `mensagem ${type}`;
        setTimeout(() => el.style.display = 'none', 5000);
      };

      loadUsers();
    })();
  </script>
</body>
</html>
