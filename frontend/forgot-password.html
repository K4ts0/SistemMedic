<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <title>Recuperar Senha — Way For System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: #F3F4F6; }
    .auth-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .logo { font-size: 48px; margin-bottom: 12px; }
    .auth-header h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .auth-header p { color: #6B7280; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #D1D5DB; border-radius: 10px; font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-group input:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #3B82F6; color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { background: #93C5FD; cursor: not-allowed; }
    .btn-secondary { background: #E5E7EB; color: #374151; margin-top: 10px; }
    .btn-secondary:hover { background: #D1D5DB; }
    .mensagem { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; position: relative; padding-left: 20px; }
    .mensagem.show { display: block; padding-left: 38px; }
    .mensagem.sucesso { background: #D1FAE5; border: 1px solid #10B981; color: #065F46; }
    .mensagem.sucesso::before { content: '✅'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
    .mensagem.erro { background: #FEE2E2; border: 1px solid #EF4444; color: #991B1B; }
    .mensagem.erro::before { content: '⚠️'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
    .mensagem.info { background: #DBEAFE; border: 1px solid #3B82F6; color: #1E40AF; }
    .mensagem.info::before { content: 'ℹ️'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
    .back-link { text-align: center; margin-top: 16px; }
    .back-link a { color: #6B7280; font-size: 14px; text-decoration: none; }
    .back-link a:hover { color: #3B82F6; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .instructions { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 14px; margin-bottom: 20px; font-size: 13px; color: #4B5563; line-height: 1.6; }
    .instructions strong { color: #111827; }
  </style>
<base target="_blank">
<base target="_blank">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">🔑</div>
        <h1>Recuperar Senha</h1>
        <p>Informe seu e-mail para receber o link de redefinição</p>
      </div>

      <div class="instructions">
        <strong>📧 Como funciona:</strong><br>
        1. Digite seu e-mail cadastrado abaixo<br>
        2. Você receberá um link no e-mail<br>
        3. Clique no link para criar uma nova senha<br>
        4. O link é válido por <strong>1 hora</strong>
      </div>

      <div id="mensagem" class="mensagem"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail cadastrado</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="btnText">📨 Enviar link de recuperação</span>
        </button>
      </form>

      <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
        ← Voltar para o login
      </button>
    </div>
  </div>

  <script type="module">
    import { resetPassword } from './supabase-config.js';

    const form = document.getElementById('forgotForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const msgEl = document.getElementById('mensagem');

    function showMessage(text, type) {
      msgEl.textContent = text;
      msgEl.className = `mensagem ${type} show`;
    }

    function hideMessage() {
      msgEl.className = 'mensagem';
    }

    function setLoading(loading) {
      btn.disabled = loading;
      if (loading) {
        btnText.innerHTML = '<span class="spinner"></span> Enviando...';
      } else {
        btnText.textContent = '📨 Enviar link de recuperação';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const email = document.getElementById('email').value.trim();

      if (!email) {
        showMessage('Por favor, informe seu e-mail.', 'erro');
        return;
      }

      setLoading(true);

      try {
        await resetPassword(email);

        // Mostra mensagem de sucesso e redireciona
        showMessage('✅ Link enviado! Verifique sua caixa de entrada (e spam).', 'sucesso');

        // Limpa o formulário
        form.reset();

        // Redireciona para login com mensagem de sucesso após 3 segundos
        setTimeout(() => {
          const successMsg = encodeURIComponent('Verifique seu e-mail. Enviamos um link para redefinir sua senha.');
          window.location.href = `index.html?success=${successMsg}`;
        }, 3000);

      } catch (error) {
        console.error('Erro ao enviar recuperação:', error);

        let errorMsg = 'Não foi possível enviar o e-mail. Tente novamente.';

        if (error.message?.includes('rate limit') || error.message?.includes('too many requests')) {
          errorMsg = 'Muitas tentativas. Aguarde alguns minutos antes de tentar novamente.';
        } else if (error.message?.includes('not found') || error.message?.includes('user not found')) {
          // Por segurança, não revelamos se o e-mail existe ou não
          // Mas mostramos uma mensagem genérica
          showMessage('Se este e-mail estiver cadastrado, você receberá o link de recuperação em breve.', 'info');
          form.reset();
          setLoading(false);
          return;
        }

        showMessage(errorMsg, 'erro');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
