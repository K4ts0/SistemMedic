<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3B82F6" />
  <title>Email Confirmado — Way For System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .confirm-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .confirm-card {
      text-align: center;
      max-width: 440px;
      width: 100%;
    }
    .confirm-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
    }
    .confirm-icon.success { background: var(--success-soft); }
    .confirm-icon.error { background: var(--danger-soft); }
    .confirm-icon.loading { background: var(--primary-soft); }
    .confirm-title { font-size: 1.5rem; font-weight: 700; color: var(--gray-800); margin-bottom: 12px; }
    .confirm-text { color: var(--gray-500); font-size: 1rem; line-height: 1.6; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
<base target="_blank">
</head>
<body>
  <div class="confirm-container">
    <div class="confirm-card card-elevated">
      <div class="confirm-icon loading" id="statusIcon">⏳</div>
      <h1 class="confirm-title" id="statusTitle">Verificando seu email...</h1>
      <p class="confirm-text" id="statusText">Aguarde um momento enquanto confirmamos sua conta.</p>
      <div class="confirm-actions" id="actions" style="display:none;">
        <a href="index.html" class="btn btn-primary">🔐 Fazer Login</a>
        <a href="register.html" class="btn btn-secondary">✨ Criar Nova Conta</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    (async function init() {
      const icon = document.getElementById('statusIcon');
      const title = document.getElementById('statusTitle');
      const text = document.getElementById('statusText');
      const actions = document.getElementById('actions');

      // Verifica se há erro no hash da URL (ex: link expirado)
      const hash = window.location.hash;
      if (hash && hash.includes('error=')) {
        const params = new URLSearchParams(hash.slice(1));
        const errorCode = params.get('error_code');
        const errorDesc = params.get('error_description');

        icon.className = 'confirm-icon error';
        icon.textContent = '❌';
        title.textContent = 'Link inválido ou expirado';
        text.textContent = errorDesc 
          ? decodeURIComponent(errorDesc.replace(/\+/g, ' '))
          : 'O link de confirmação é inválido ou já expirou. Solicite um novo cadastro.';
        actions.style.display = 'flex';
        return;
      }

      try {
        // O Supabase já processou o token e criou a sessão antes de redirecionar
        // Aguardamos um momento para o supabase-js detectar os tokens no hash
        await new Promise(r => setTimeout(r, 1500));

        const { data: { session }, error } = await supabase.auth.getSession();

        if (error) throw error;

        if (session && session.user) {
          // Email confirmado com sucesso!
          icon.className = 'confirm-icon success';
          icon.textContent = '✅';
          title.textContent = 'Email verificado com sucesso!';
          text.textContent = 'Sua conta foi confirmada. Agora você pode fazer login e começar a usar o NoteMed.';
          actions.style.display = 'flex';

          // Opcional: redireciona automaticamente para dashboard após 4 segundos
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 4000);
          return;
        }

        // Sem sessão - pode ser que o token já foi usado ou expirou
        icon.className = 'confirm-icon error';
        icon.textContent = '❌';
        title.textContent = 'Não foi possível verificar';
        text.textContent = 'Não detectamos uma confirmação válida. O link pode ter expirado ou já foi usado. Tente fazer login ou cadastre-se novamente.';
        actions.style.display = 'flex';

      } catch (err) {
        icon.className = 'confirm-icon error';
        icon.textContent = '❌';
        title.textContent = 'Erro na verificação';
        text.textContent = err.message || 'Ocorreu um erro ao verificar seu email. Tente novamente mais tarde.';
        actions.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
